    <section class="about">
        <h2>𝓡𝓪𝓯𝓪𝓻𝔂 の由来</h2>

        <p>
        「𝓡𝓪𝓯𝓪𝓻𝔂」という言葉自体に、
        辞書的な意味はありません。
        </p>

        <p>
        夜の静けさ。<br>
        感情の余韻。<br>
        都市の灯り。<br>
        焚き火の温かさ。<br>
        そして、“自分らしさ”。
        </p>

        <p>
        そんな世界観や空気感を込めて生まれた名前です。
        </p>

        <p>
        “R” は、自身の名前のイニシャルから。
        </p>

        <p>
        既存の言葉ではなく、
        活動や音楽、出会いを通して、
        これから意味を作っていく、
        オリジナルの名前。
        </p>
    </section>
